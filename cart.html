<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Planet Shop | Cart</title>
<link rel="stylesheet" href="styles.css?v=20260515-auth2">
</head>
<body>

<header>
    <a href="index.html" class="logo">PLANET SHOP</a>
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="catalog.html">CATALOG</a></li>
            <li><a href="index.html#offers">OFFERS</a></li>
            <li><a href="index.html#about">ABOUT US</a></li>
            <li><a href="cart.html" id="cart-nav-link" class="active">CART (<span id="cart-count">0</span>)</a></li>
            <li><a href="signup.html" class="signup auth-trigger">SIGN UP</a></li>
        </ul>
    </nav>
</header>

<main>
    <h1 class="page-title">YOUR CART</h1>
    <p class="page-desc" id="cart-desc">Review your selected planets before checkout.</p>

    <div class="cart-container">
        <div class="cart-items" id="cart-items-container">
            <!-- Cart items injected by app.js -->
        </div>

        <div class="cart-summary">
            <h3>Order Summary</h3>
            <div style="margin-top: 20px;">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">$0</span>
                </div>
                <div class="summary-row">
                    <span>Cosmic Tax</span>
                    <span id="cart-tax">$0</span>
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="cart-total">$0</span>
                </div>
                <form class="checkout-form" id="checkout-form">
                    <label for="checkout-email">Checkout Email</label>
                    <input type="email" id="checkout-email" placeholder="Enter your email for order confirmation" required>
                    <button class="btn" id="checkout-btn" type="submit" style="width: 100%; margin-top: 18px;">CHECKOUT</button>
                </form>
                <p class="checkout-note">You will receive an on-site confirmation notification after checkout.</p>
                <div class="checkout-status" id="checkout-status" aria-live="polite"></div>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 Planet Shop. </p>
</footer>

<script src="app.js?v=20260515-auth2"></script>
</body>
</html>
