<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Shop | Catalog</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="catalog">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">PS</span>
        <span>
          <strong>PLANET SHOP</strong>
          <small>Cosmic commerce for curious collectors</small>
        </span>
      </a>

      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="catalog.html" class="active">Catalog</a>
        <a href="cart.html">Cart</a>
        <a href="about.html">About</a>
      </nav>

      <div class="topbar-actions">
        <label class="search-box">
          <span>Search</span>
          <input id="catalogSearch" type="text" placeholder="Search a planet or type..." />
        </label>
        <a class="cart-link" href="cart.html">Cart <span id="navCartCount">0</span></a>
      </div>
    </header>

    <main>
      <section class="section-block compact-top">
        <div class="section-heading">
          <span class="eyebrow">Catalog</span>
          <h1 class="page-title">Browse the planet collection</h1>
          <p>Filter by world type, search by name, and open each item on its own dedicated detail page.</p>
        </div>

        <div class="filters" id="catalogFilters">
          <button class="filter-btn active" data-filter="all">All Worlds</button>
          <button class="filter-btn" data-filter="rocky">Rocky</button>
          <button class="filter-btn" data-filter="gas giant">Gas Giant</button>
          <button class="filter-btn" data-filter="ice giant">Ice Giant</button>
          <button class="filter-btn" data-filter="habitable fantasy">Habitable Fantasy</button>
        </div>

        <div class="catalog-grid" id="catalogGrid"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
