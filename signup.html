<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Planet Shop | Sign Up</title>
<link rel="stylesheet" href="styles.css?v=20260515-auth2">
<style>
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        opacity: 0.9;
    }
    .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #555;
        border-radius: 8px;
        background: #222;
        color: white;
    }
    .form-group input:focus {
        outline: none;
        border-color: white;
    }
</style>
</head>
<body>

<header>
    <a href="index.html" class="logo">PLANET SHOP</a>
    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="catalog.html">CATALOG</a></li>
            <li><a href="index.html#offers">OFFERS</a></li>
            <li><a href="index.html#about">ABOUT US</a></li>
            <li><a href="cart.html" id="cart-nav-link">CART (<span id="cart-count">0</span>)</a></li>
            <li><a href="signup.html" class="signup active auth-trigger">SIGN UP</a></li>
        </ul>
    </nav>
</header>

<main>
    <h1 class="page-title" style="text-align:center;">JOIN THE GALAXY</h1>
    <p class="page-desc auth-page-desc" style="text-align:center;">Create an account or log in to manage your cosmic collection.</p>

    <div class="signup-container">
        <div class="auth-toggle" role="tablist" aria-label="Authentication mode">
            <button type="button" class="auth-tab active" data-auth-mode="signup">Sign Up</button>
            <button type="button" class="auth-tab" data-auth-mode="login">Log In</button>
        </div>

        <form id="auth-form" data-mode="signup">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn" id="auth-submit-btn" style="width: 100%; margin-top: 10px;">SIGN UP NOW</button>
        </form>
        <div class="auth-status" id="auth-status" aria-live="polite"></div>
        <p style="text-align:center; margin-top: 20px; font-size: 14px; opacity: 0.7;">Want to keep browsing first? <a href="catalog.html" style="text-decoration:underline;">Visit the catalog</a></p>
    </div>
</main>

<footer>
    <p>&copy; 2026 Planet Shop.</p>
</footer>

<script src="app.js?v=20260515-auth2"></script>
</body>
</html>
